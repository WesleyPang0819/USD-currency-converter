< index.html >
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>外币兑马币实时汇率</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 1rem;
            -webkit-user-select: none;
            user-select: none;
        }
        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
        }
        .rotate-180 {
            transform: rotate(180deg);
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }
        input {
            -webkit-user-select: auto;
            user-select: auto;
        }
        /* 选中状态样式 */
        .tab-active {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>

<div class="card p-6 sm:p-8">
    <div class="text-center mb-6">
        <div class="inline-block p-3 bg-blue-50 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">实时汇率转换</h1>
        
        <!-- 币种切换 Tab -->
        <div class="flex justify-center mt-4 bg-gray-100 p-1 rounded-xl">
            <button onclick="changeBaseCurrency('USD')" id="tab-USD" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all tab-active">USD 美元</button>
            <button onclick="changeBaseCurrency('SGD')" id="tab-SGD" class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-gray-500">SGD 新币</button>
        </div>
    </div>

    <!-- 汇率显示卡片 -->
    <div id="status-box" onclick="toggleView()" class="bg-blue-600 rounded-2xl p-5 mb-6 text-white text-center shadow-lg shadow-blue-200 cursor-pointer active:scale-95 transition-all relative overflow-hidden group">
        <div class="absolute right-2 top-2 opacity-20 group-hover:opacity-100 transition-opacity">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
            </svg>
        </div>
        <span class="opacity-80 text-xs font-medium uppercase tracking-widest" id="rate-label">当前实时汇率</span>
        <div class="text-2xl font-bold mt-1" id="rate-text">获取中...</div>
        <div class="text-[10px] opacity-70 mt-2" id="update-time">正在连接全球汇率库...</div>
    </div>

    <div class="space-y-4 relative">
        <div class="relative">
            <label class="text-xs font-bold text-gray-400 ml-1 uppercase" id="label-1">美元 (USD)</label>
            <div class="flex items-center mt-1 bg-gray-50 rounded-xl px-4 py-3 border border-transparent focus-within:border-blue-500 transition-all">
                <span class="text-xl font-semibold text-gray-400 mr-3" id="symbol-1">$</span>
                <input type="number" id="input-1" class="bg-transparent w-full text-xl font-bold text-gray-800 outline-none" placeholder="0" inputmode="decimal">
            </div>
        </div>

        <div class="flex justify-center -my-3 relative z-10">
            <button onclick="toggleView()" class="bg-white border border-gray-100 rounded-full p-2 shadow-md hover:shadow-lg active:scale-90 transition-all text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" id="swap-icon" class="h-5 w-5 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                </svg>
            </button>
        </div>

        <div class="relative">
            <label class="text-xs font-bold text-gray-400 ml-1 uppercase" id="label-2">马来西亚林吉特 (MYR)</label>
            <div class="flex items-center mt-1 bg-gray-50 rounded-xl px-4 py-3 border border-transparent focus-within:border-blue-500 transition-all">
                <span class="text-xl font-semibold text-gray-400 mr-3" id="symbol-2">RM</span>
                <input type="number" id="input-2" class="bg-transparent w-full text-xl font-bold text-gray-800 outline-none" placeholder="0" inputmode="decimal">
            </div>
        </div>
    </div>

    <div class="mt-8">
        <p class="text-[10px] font-bold text-gray-300 uppercase mb-2 ml-1">快速转换</p>
        <div class="grid grid-cols-3 gap-2" id="quick-btns"></div>
    </div>

    <p class="text-[10px] text-gray-400 text-center mt-8 italic">数据源: ExchangeRate-API (实时同步)</p>
</div>

<script>
    // 状态管理
    let rates = { USD: 4.45, SGD: 3.30 }; // 初始默认值
    let currentBase = 'USD'; // 当前选择的外币
    let isForeignMaster = true; // 是否为外币转马币模式
    
    const currencyInfo = {
        USD: { name: '美元', symbol: '$' },
        SGD: { name: '新加坡元', symbol: 'S$' },
        MYR: { name: '马来西亚林吉特', symbol: 'RM' }
    };

    const input1 = document.getElementById('input-1');
    const input2 = document.getElementById('input-2');
    const rateText = document.getElementById('rate-text');
    const updateTime = document.getElementById('update-time');
    const rateLabel = document.getElementById('rate-label');
    const swapIcon = document.getElementById('swap-icon');
    const label1 = document.getElementById('label-1');
    const label2 = document.getElementById('label-2');
    const symbol1 = document.getElementById('symbol-1');
    const symbol2 = document.getElementById('symbol-2');

    // 获取汇率数据
    async function fetchRates() {
        try {
            // 获取 USD 对各币种汇率
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            if(data && data.rates) {
                rates.USD = data.rates.MYR;
                // 计算 SGD 汇率 (通过 MYR 和 SGD 相对 USD 的比例得出)
                rates.SGD = data.rates.MYR / data.rates.SGD;
                
                const d = new Date();
                updateTime.innerText = `最后同步: ${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
                updateDisplay();
            }
        } catch (e) {
            rateText.innerText = "网络连接中...";
        }
    }

    // 切换币种 (USD/SGD)
    function changeBaseCurrency(code) {
        currentBase = code;
        // 更新 Tab 样式
        document.getElementById('tab-USD').className = code === 'USD' ? 'flex-1 py-2 text-sm font-bold rounded-lg transition-all tab-active' : 'flex-1 py-2 text-sm font-bold rounded-lg transition-all text-gray-500';
        document.getElementById('tab-SGD').className = code === 'SGD' ? 'flex-1 py-2 text-sm font-bold rounded-lg transition-all tab-active' : 'flex-1 py-2 text-sm font-bold rounded-lg transition-all text-gray-500';
        
        updateDisplay();
    }

    function updateDisplay() {
        const currentRate = rates[currentBase];
        const baseInfo = currencyInfo[currentBase];
        const myrInfo = currencyInfo['MYR'];

        if (isForeignMaster) {
            rateText.innerText = `1 ${currentBase} = ${currentRate.toFixed(4)} MYR`;
            rateLabel.innerText = `当前汇率 (${baseInfo.name}兑马币)`;
            label1.innerText = `${baseInfo.name} (${currentBase})`;
            symbol1.innerText = baseInfo.symbol;
            label2.innerText = `${myrInfo.name} (MYR)`;
            symbol2.innerText = myrInfo.symbol;
        } else {
            const revRate = 1 / currentRate;
            rateText.innerText = `1 MYR = ${revRate.toFixed(4)} ${currentBase}`;
            rateLabel.innerText = `当前汇率 (马币兑${baseInfo.name})`;
            label1.innerText = `${myrInfo.name} (MYR)`;
            symbol1.innerText = myrInfo.symbol;
            label2.innerText = `${baseInfo.name} (${currentBase})`;
            symbol2.innerText = baseInfo.symbol;
        }
        renderQuickBtns();
        convert1to2();
    }

    function toggleView() {
        isForeignMaster = !isForeignMaster;
        swapIcon.classList.toggle('rotate-180');
        const val1 = input1.value;
        const val2 = input2.value;
        input1.value = val2;
        input2.value = val1;
        updateDisplay();
    }

    function convert1to2() {
        const val = parseFloat(input1.value);
        if (isNaN(val)) { input2.value = ''; return; }
        const currentRate = rates[currentBase];
        
        if (isForeignMaster) {
            input2.value = (val * currentRate).toFixed(2);
        } else {
            input2.value = (val * (1 / currentRate)).toFixed(2);
        }
    }

    function convert2to1() {
        const val = parseFloat(input2.value);
        if (isNaN(val)) { input1.value = ''; return; }
        const currentRate = rates[currentBase];

        if (isForeignMaster) {
            input1.value = (val / currentRate).toFixed(2);
        } else {
            input1.value = (val / (1 / currentRate)).toFixed(2);
        }
    }

    function renderQuickBtns() {
        const container = document.getElementById('quick-btns');
        let vals = [];
        let unit = "";

        if (isForeignMaster) {
            vals = currentBase === 'USD' ? [10, 100, 1000] : [50, 500, 1000];
            unit = currencyInfo[currentBase].symbol;
        } else {
            vals = [100, 500, 1000];
            unit = "RM";
        }

        container.innerHTML = vals.map(v => `
            <button onclick="quickSet(${v})" class="py-3 text-xs font-bold bg-gray-50 text-gray-500 rounded-xl active:bg-blue-600 active:text-white transition-all border border-gray-100">
                ${v.toLocaleString()} ${unit}
            </button>
        `).join('');
    }

    function quickSet(val) {
        input1.value = val;
        convert1to2();
    }

    input1.addEventListener('input', convert1to2);
    input2.addEventListener('input', convert2to1);

    window.onload = () => {
        fetchRates();
        input1.value = 100;
        updateDisplay();
        // 每5分钟自动刷新一次汇率
        setInterval(fetchRates, 300000);
    };
</script>

</body>
</html>
